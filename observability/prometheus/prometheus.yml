global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    app: signal-lab

scrape_configs:
  - job_name: signal-lab-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3001
        labels:
          app: signal-lab
          service: backend

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
