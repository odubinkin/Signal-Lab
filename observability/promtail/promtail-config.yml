server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: signal-lab-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.signal-lab.observe=true"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_signal_lab_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - replacement: signal-lab
        target_label: app
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            context: context
            scenarioType: scenarioType
            scenarioId: scenarioId
            duration: duration
            error: error
      - labels:
          level:
          context:
          scenarioType:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
          action_on_failure: skip
